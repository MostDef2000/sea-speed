name: Package Windows Worker

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/package-worker.yml"
  push:
    branches:
      - main
    paths:
      - "worker/**"
      - ".github/workflows/package-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sea-speed-worker-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate worker PowerShell syntax
        shell: pwsh
        run: |
          foreach ($file in @('worker/update_worker.ps1', 'worker/run_worker_once.ps1')) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file),
              [ref]$tokens,
              [ref]$errors
            )
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

      - name: Validate worker Python syntax
        shell: pwsh
        run: python -m py_compile worker/hls_motion_yolo_worker_events.py

      - name: Build exact-commit worker package
        shell: pwsh
        run: |
          $packageDir = Join-Path $PWD 'dist/sea-speed-worker'
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          $managedFiles = @(
            'hls_motion_yolo_worker_events.py',
            'README.txt',
            'start_worker.cmd',
            'stop_worker.cmd',
            'restart_worker.cmd',
            'status_worker.cmd',
            'run_event_worker_forever.cmd',
            'run_worker_once.ps1',
            'update_worker.ps1',
            'update_worker.cmd'
          )

          foreach ($file in $managedFiles) {
            $source = Join-Path 'worker' $file
            if (-not (Test-Path $source -PathType Leaf)) {
              throw "Missing managed worker file: $file"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $packageDir $file) -Force
          }

          Set-Content -LiteralPath (Join-Path $packageDir 'commit-sha.txt') -Value $env:GITHUB_SHA -Encoding ascii
          Compress-Archive -Path "$packageDir/*" -DestinationPath 'dist/sea-speed-worker.zip' -Force

      - name: Upload worker package
        uses: actions/upload-artifact@v4
        with:
          name: sea-speed-worker-${{ github.sha }}
          path: dist/sea-speed-worker.zip
          retention-days: 14
          if-no-files-found: error

      - name: Package summary
        shell: pwsh
        run: |
          '### Sea Speed Windows worker package' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          ('- Commit: `{0}`' -f $env:GITHUB_SHA) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          '- Target: `D:\sea-speed`' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          '- Runtime secrets: loaded from preserved local `.env`' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          '- Preserved: `.env`, `.venv`, `output`, models, patch files and local backups' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
